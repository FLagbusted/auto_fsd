# MLflow community-charts/mlflow 1.8.5 values override
resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi
postgresql:
  enabled: false
service:
  type: ClusterIP
  port: 5000
# Disable gunicorn → use uvicorn (enables security middleware / CORS)
gunicornOpts: ""
