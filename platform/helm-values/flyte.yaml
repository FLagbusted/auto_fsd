# Flyte Binary chart v2.0.23 values override

flyte-core-components:
  admin:
    seedProjects:
      - auto-e2e

configuration:
  auth:
    enabled: false
  inline:
    tasks:
      task-plugins:
        enabled-plugins:
          - container
          - sidecar
          - k8s-array
          - pytorch
        default-for-task-types:
          container: container
          sidecar: sidecar
          container_array: k8s-array
          pytorch: pytorch

deployment:
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi
